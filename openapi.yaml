openapi: "3.0.3"
info:
  title: HugRS API
  description: |
    Transparent caching proxy for HuggingFace & ModelScope model files.
    Proxy follows 30x redirects internally — clients always receive 200/206.
  version: "0.2.0"

servers:
  - url: http://127.0.0.1:3000
    description: Default

tags:
  - name: App
    description: Application-level endpoints (health, stats)
  - name: HuggingFace
    description: HuggingFace Hub proxy (used by huggingface-cli, hfd.sh, huggingface_hub SDK)
  - name: ModelScope
    description: ModelScope Hub proxy (used by modelscope CLI/SDK)
  - name: Git
    description: Git/LFS proxy for git clone support

paths:
  # ═══════════════════════════════════════════════════════════════════════
  # App
  # ═══════════════════════════════════════════════════════════════════════

  /:
    get:
      tags: [App]
      summary: Health check
      operationId: root
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  version:
                    type: string
                  hf_endpoint:
                    type: string
                  ms_endpoint:
                    type: string

  /api/stats:
    get:
      tags: [App]
      summary: Cache statistics
      operationId: stats
      responses:
        "200":
          description: Cache statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /api/agent-harnesses:
    get:
      tags: [App]
      summary: Agent harnesses (proxied from HF upstream)
      operationId: agent_harnesses
      responses:
        "200":
          description: Upstream JSON response
          content:
            application/json:
              schema:
                type: object

  # ═══════════════════════════════════════════════════════════════════════
  # HuggingFace Hub
  # ═══════════════════════════════════════════════════════════════════════

  /api/whoami-v2:
    get:
      tags: [HuggingFace]
      summary: Identity check (HF SDK login probe)
      operationId: whoami
      responses:
        "200":
          description: Always reports as authenticated mirror
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  auth:
                    type: boolean

  # ── Legacy unprefixed routes ──────────────────────────────────────────

  /api/models/{org}/{repo}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
    get:
      tags: [HuggingFace]
      summary: Model info @ main (legacy)
      operationId: hf_model_info_simple
      responses:
        "200":
          $ref: "#/components/responses/ModelInfo"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [HuggingFace]
      summary: Check model existence @ main (legacy)
      operationId: hf_model_info_simple_head
      responses:
        "200":
          description: OK
        "404":
          $ref: "#/components/responses/NotFound"

  /api/models/{org}/{repo}/revision/{revision}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - $ref: "#/components/parameters/Revision"
    get:
      tags: [HuggingFace]
      summary: Model info at revision (legacy)
      description: |
        Returns model metadata including `siblings` array (file list).
        Called by `snapshot_download` to discover files before downloading.
      operationId: hf_model_info_revision
      responses:
        "200":
          $ref: "#/components/responses/ModelInfo"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [HuggingFace]
      summary: Check revision existence (legacy)
      operationId: hf_model_info_revision_head
      responses:
        "200":
          description: OK
        "404":
          $ref: "#/components/responses/NotFound"

  /api/models/{org}/{repo}/{*suffix}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - name: suffix
        in: path
        required: true
        schema:
          type: string
        description: Sub-path (e.g. tree/main, discussions)
    get:
      tags: [HuggingFace]
      summary: Model API sub-path (legacy — tree, discussions, etc.)
      operationId: hf_model_api_suffix
      responses:
        "200":
          description: Proxied upstream response (usually JSON)
          content:
            application/json:
              schema:
                type: object

  /{org}/{repo}/resolve/{revision}/{path}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - $ref: "#/components/parameters/Revision"
      - $ref: "#/components/parameters/FilePath"
    get:
      tags: [HuggingFace]
      summary: Download file (legacy)
      description: |
        Returns file content (no redirect to client). Serves from cache if
        available, otherwise proxies from upstream and caches.
        Supports Range for resumable downloads. Compression is used.
      operationId: hf_file_resolve
      responses:
        "200":
          $ref: "#/components/responses/FileDownload"
        "206":
          $ref: "#/components/responses/PartialFile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [HuggingFace]
      summary: File metadata (legacy)
      description: |
        Returns Content-Length, ETag, X-Repo-Commit without body.
        CLI uses this to decide download vs. skip (ETag match).
      operationId: hf_file_resolve_head
      responses:
        "200":
          $ref: "#/components/responses/FileMetadata"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/resolve-cache/{repo_type}/{org}/{repo}/{revision}/{path}:
    parameters:
      - $ref: "#/components/parameters/RepoType"
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - $ref: "#/components/parameters/Revision"
      - $ref: "#/components/parameters/FilePath"
    get:
      tags: [HuggingFace]
      summary: Get cached file (resolve-cache internal)
      operationId: hf_resolve_cache_get
      responses:
        "200":
          $ref: "#/components/responses/FileDownload"
        "404":
          description: Not cached
    head:
      tags: [HuggingFace]
      summary: Check cache state (resolve-cache internal)
      description: |
        HF SDK calls this after HEAD to determine if file is already cached.
      operationId: hf_resolve_cache_head
      responses:
        "200":
          $ref: "#/components/responses/FileMetadata"
        "404":
          description: Not cached

  # ── /hf/ prefixed routes ──────────────────────────────────────────────

  /hf/api/models/{org}/{repo}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
    get:
      tags: [HuggingFace]
      summary: Model info @ main (/hf prefix)
      operationId: hf_prefixed_model_info_simple
      responses:
        "200":
          $ref: "#/components/responses/ModelInfo"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [HuggingFace]
      summary: Check model existence @ main (/hf prefix)
      operationId: hf_prefixed_model_info_simple_head
      responses:
        "200":
          description: OK
        "404":
          $ref: "#/components/responses/NotFound"

  /hf/api/models/{org}/{repo}/revision/{revision}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - $ref: "#/components/parameters/Revision"
    get:
      tags: [HuggingFace]
      summary: Model info at revision (/hf prefix)
      operationId: hf_prefixed_model_info_revision
      responses:
        "200":
          $ref: "#/components/responses/ModelInfo"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [HuggingFace]
      summary: Check revision existence (/hf prefix)
      operationId: hf_prefixed_model_info_revision_head
      responses:
        "200":
          description: OK
        "404":
          $ref: "#/components/responses/NotFound"

  /hf/api/models/{org}/{repo}/{*suffix}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - name: suffix
        in: path
        required: true
        schema:
          type: string
        description: Sub-path (e.g. tree/main)
    get:
      tags: [HuggingFace]
      summary: Model API sub-path (/hf prefix)
      operationId: hf_prefixed_model_api_suffix
      responses:
        "200":
          description: Proxied upstream response (usually JSON)
          content:
            application/json:
              schema:
                type: object

  /hf/{org}/{repo}/resolve/{revision}/{path}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - $ref: "#/components/parameters/Revision"
      - $ref: "#/components/parameters/FilePath"
    get:
      tags: [HuggingFace]
      summary: Download file (/hf prefix)
      description: Same as legacy resolve, with /hf/ prefix.
      operationId: hf_prefixed_file_resolve
      responses:
        "200":
          $ref: "#/components/responses/FileDownload"
        "206":
          $ref: "#/components/responses/PartialFile"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [HuggingFace]
      summary: File metadata (/hf prefix)
      operationId: hf_prefixed_file_resolve_head
      responses:
        "200":
          $ref: "#/components/responses/FileMetadata"
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════════════════════════════
  # ModelScope Hub
  # ═══════════════════════════════════════════════════════════════════════

  /ms/api/v1/models/{org}/{repo}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
    get:
      tags: [ModelScope]
      summary: Model info @ main
      operationId: ms_model_info_simple
      responses:
        "200":
          $ref: "#/components/responses/ModelInfo"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [ModelScope]
      summary: Check model existence @ main
      operationId: ms_model_info_simple_head
      responses:
        "200":
          description: OK
        "404":
          $ref: "#/components/responses/NotFound"

  /ms/api/v1/models/{org}/{repo}/revision/{revision}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - $ref: "#/components/parameters/Revision"
    get:
      tags: [ModelScope]
      summary: Model info at revision
      operationId: ms_model_info_revision
      responses:
        "200":
          $ref: "#/components/responses/ModelInfo"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [ModelScope]
      summary: Check revision existence
      operationId: ms_model_info_revision_head
      responses:
        "200":
          description: OK
        "404":
          $ref: "#/components/responses/NotFound"

  /ms/api/v1/models/{org}/{repo}/{*suffix}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - name: suffix
        in: path
        required: true
        schema:
          type: string
        description: Sub-path (e.g. repo/files)
    get:
      tags: [ModelScope]
      summary: Model API sub-path
      operationId: ms_model_api_suffix
      responses:
        "200":
          description: Proxied upstream response (usually JSON)
          content:
            application/json:
              schema:
                type: object

  /ms/api/v1/models/{org}/{repo}/repo:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - name: Revision
        in: query
        required: true
        schema:
          type: string
        description: Revision (e.g. master)
      - name: FilePath
        in: query
        required: true
        schema:
          type: string
        description: File path within repo
    get:
      tags: [ModelScope]
      summary: Download file (query-param style)
      description: ModelScope alternative file access via query parameters.
      operationId: ms_repo_file_proxy
      responses:
        "200":
          $ref: "#/components/responses/FileDownload"
        "206":
          $ref: "#/components/responses/PartialFile"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [ModelScope]
      summary: File metadata (query-param style)
      operationId: ms_repo_file_proxy_head
      responses:
        "200":
          $ref: "#/components/responses/FileMetadata"
        "404":
          $ref: "#/components/responses/NotFound"

  /ms/{org}/{repo}/resolve/{revision}/{path}:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - $ref: "#/components/parameters/Revision"
      - $ref: "#/components/parameters/FilePath"
    get:
      tags: [ModelScope]
      summary: Download file (resolve path)
      description: ModelScope file download via /resolve/ path.
      operationId: ms_file_resolve
      responses:
        "200":
          $ref: "#/components/responses/FileDownload"
        "206":
          $ref: "#/components/responses/PartialFile"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      tags: [ModelScope]
      summary: File metadata (resolve path)
      operationId: ms_file_resolve_head
      responses:
        "200":
          $ref: "#/components/responses/FileMetadata"
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════════════════════════════
  # Git/LFS Proxy
  # ═══════════════════════════════════════════════════════════════════════

  /{org}/{repo}/info/refs:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - name: service
        in: query
        required: true
        schema:
          type: string
          example: git-upload-pack
    get:
      tags: [HuggingFace, Git]
      summary: Git info/refs (legacy)
      operationId: git_info_refs
      responses:
        "200":
          description: Git upload-pack advertisement

  /{org}/{repo}/git-upload-pack:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
    post:
      tags: [HuggingFace, Git]
      summary: Git upload-pack (legacy)
      operationId: git_upload_pack
      responses:
        "200":
          description: Git packfile data

  /{org}/{repo}/info/lfs/objects/batch:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
    post:
      tags: [HuggingFace, Git]
      summary: Git LFS batch API (legacy)
      description: Proxies LFS batch to upstream, rewrites download URLs to proxy.
      operationId: lfs_batch
      responses:
        "200":
          description: LFS batch response with rewritten download URLs

  /hf/{org}/{repo}/info/refs:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - name: service
        in: query
        required: true
        schema:
          type: string
          example: git-upload-pack
    get:
      tags: [HuggingFace, Git]
      summary: Git info/refs (/hf prefix)
      operationId: hf_prefixed_git_info_refs
      responses:
        "200":
          description: Git upload-pack advertisement

  /hf/{org}/{repo}/git-upload-pack:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
    post:
      tags: [HuggingFace, Git]
      summary: Git upload-pack (/hf prefix)
      operationId: hf_prefixed_git_upload_pack
      responses:
        "200":
          description: Git packfile data

  /hf/{org}/{repo}/info/lfs/objects/batch:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
    post:
      tags: [HuggingFace, Git]
      summary: Git LFS batch API (/hf prefix)
      operationId: hf_prefixed_lfs_batch
      responses:
        "200":
          description: LFS batch response with rewritten download URLs

  /ms/{org}/{repo}/info/refs:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
      - name: service
        in: query
        required: true
        schema:
          type: string
          example: git-upload-pack
    get:
      tags: [ModelScope, Git]
      summary: Git info/refs (/ms prefix)
      operationId: ms_git_info_refs
      responses:
        "200":
          description: Git upload-pack advertisement

  /ms/{org}/{repo}/git-upload-pack:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
    post:
      tags: [ModelScope, Git]
      summary: Git upload-pack (/ms prefix)
      operationId: ms_git_upload_pack
      responses:
        "200":
          description: Git packfile data

  /ms/{org}/{repo}/info/lfs/objects/batch:
    parameters:
      - $ref: "#/components/parameters/Org"
      - $ref: "#/components/parameters/Repo"
    post:
      tags: [ModelScope, Git]
      summary: Git LFS batch API (/ms prefix)
      operationId: ms_lfs_batch
      responses:
        "200":
          description: LFS batch response with rewritten download URLs

# ═══════════════════════════════════════════════════════════════════════════
components:
  parameters:
    Org:
      name: org
      in: path
      required: true
      schema:
        type: string
      example: Qwen
    Repo:
      name: repo
      in: path
      required: true
      schema:
        type: string
      example: Qwen3.5-0.8B
    Revision:
      name: revision
      in: path
      required: true
      schema:
        type: string
      description: Branch name or commit SHA
      example: main
    FilePath:
      name: path
      in: path
      required: true
      schema:
        type: string
      description: File path within repo (wildcard)
      example: model.safetensors
    RepoType:
      name: repo_type
      in: path
      required: true
      schema:
        type: string
        enum: [models, datasets, spaces]
      example: models

  responses:
    ModelInfo:
      description: Model metadata
      headers:
        X-Repo-Commit:
          schema:
            type: string
          description: Current commit SHA
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ModelInfo"

    FileMetadata:
      description: File metadata headers (no body)
      headers:
        Content-Length:
          schema:
            type: integer
            format: int64
        ETag:
          schema:
            type: string
        Accept-Ranges:
          schema:
            type: string
            example: bytes
        Content-Type:
          schema:
            type: string
        X-Repo-Commit:
          schema:
            type: string
        X-Linked-Size:
          schema:
            type: integer
            format: int64
        X-Linked-ETag:
          schema:
            type: string

    FileDownload:
      description: Full file content
      headers:
        Content-Length:
          schema:
            type: integer
            format: int64
        Content-Type:
          schema:
            type: string
        ETag:
          schema:
            type: string
        Accept-Ranges:
          schema:
            type: string
        X-Repo-Commit:
          schema:
            type: string
        Content-Disposition:
          schema:
            type: string
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary

    PartialFile:
      description: Partial content (Range request)
      headers:
        Content-Range:
          schema:
            type: string
        Content-Length:
          schema:
            type: integer
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ModelInfo:
      type: object
      properties:
        id:
          type: string
          example: Qwen/Qwen3.5-0.8B
        sha:
          type: string
          description: HEAD commit SHA
        siblings:
          type: array
          items:
            $ref: "#/components/schemas/Sibling"
        private:
          type: boolean
        tags:
          type: array
          items:
            type: string
        pipeline_tag:
          type: string
        library_name:
          type: string
        lastModified:
          type: string
          format: date-time

    Sibling:
      type: object
      properties:
        rfilename:
          type: string
          example: model.safetensors

    Stats:
      type: object
      properties:
        repo_count:
          type: integer
          format: int64
        file_count:
          type: integer
          format: int64
        chunk_count:
          type: integer
          format: int64
        original_bytes:
          type: integer
          format: int64
        stored_bytes:
          type: integer
          format: int64
        bytes_saved:
          type: integer
          format: int64
        saved_percent:
          type: number
          format: double
        fetched_bytes:
          type: integer
          format: int64
        served_bytes:
          type: integer
          format: int64

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
