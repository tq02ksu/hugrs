name: Feature Request
description: Suggest an improvement or new capability
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea to improve HugRS.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is missing today?
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or interface you want.
      placeholder: HugRS could add...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workaround or alternative you tried.
      placeholder: I also considered...

  - type: textarea
    id: impact
    attributes:
      label: Why this matters
      description: Explain the user impact, operational benefit, or maintenance value.
      placeholder: This would help because...

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, links, API details, or screenshots if helpful.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before submitting this request.
          required: true
