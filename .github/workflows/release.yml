name: Release

on:
  push:
    tags: ["v*"]

jobs:
  binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: hugrs-x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: hugrs-x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: hugrs-aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset_name: hugrs-aarch64-unknown-linux-musl
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: hugrs-x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            asset_name: hugrs-aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: hugrs-x86_64-pc-windows-msvc
            archive_ext: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset_name: hugrs-aarch64-pc-windows-msvc
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Zig
        if: runner.os == 'Linux' && contains(matrix.target, '-musl')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux' && contains(matrix.target, '-musl')
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary (Linux musl)
        if: runner.os == 'Linux' && contains(matrix.target, '-musl')
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build release binary (Linux gnu)
        if: runner.os == 'Linux' && !contains(matrix.target, '-musl')
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (macOS)
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/hugrs dist/hugrs
          cp target/${{ matrix.target }}/release/hugrsctl dist/hugrsctl
          archive_name="hugrs-${RELEASE_VERSION}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          tar -C dist -czf "$archive_name" hugrs hugrsctl
          echo "ARCHIVE_NAME=$archive_name" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/hugrs.exe" "dist/hugrs.exe"
          Copy-Item "target/${{ matrix.target }}/release/hugrsctl.exe" "dist/hugrsctl.exe"
          $archiveName = "hugrs-$env:RELEASE_VERSION-${{ matrix.target }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "dist/hugrs.exe","dist/hugrsctl.exe" -DestinationPath $archiveName
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ env.ARCHIVE_NAME }}

  publish_binary:
    needs: binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Extract changelog for this version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"       # v0.6.0
          VER="${TAG#v}"                        # 0.6.0
          # Extract the section between "## [<VER>]" and the next "## ["
          awk -v ver="$VER" '
            /^## \[/ {
              if (found) exit;
              if ($0 ~ "^## \\[" ver "\\]") found=1;
              next;
            }
            found { print }
          ' CHANGELOG.md > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: /tmp/release_body.md

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
